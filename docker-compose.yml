services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: smartnotes
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: mysql://root:password@db:3306/smartnotes
      SESSION_SECRET: troque_em_producao
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: development
      PORT: 3333
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333/v1
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  db_data:
